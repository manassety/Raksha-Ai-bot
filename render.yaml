services:
  - type: web
    name: raksha-ai-bot-x2ww
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gthread --threads 4 -w 1 app:app --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: GEMINI_API_KEY
        value: placeholder
